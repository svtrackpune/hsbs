<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <title>HSBS Lead Pro</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  
  <style>
    :root { --brand: #0052cc; --bg: #f4f5f7; }
    
    /* Force Mobile View on Desktop */
    body { 
      background: #253858; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      margin: 0; 
      font-family: sans-serif;
    }

    .app-container {
      width: 100%;
      max-width: 450px; /* Limits width on desktop */
      height: 100%;
      max-height: 900px;
      background: var(--bg);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    }

    .screen { 
      position: absolute; width: 100%; height: 100%; 
      display: none; flex-direction: column; background: var(--bg); 
    }
    .screen.active { display: flex; animation: fadeIn 0.3s; }
    
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .scroll-body { flex: 1; padding: 25px; overflow-y: auto; }
    
    .card-ui { 
      background: white; border-radius: 16px; padding: 20px; 
      border: 1px solid #dfe1e6; box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
    }

    .logo { height: 50px; object-fit: contain; margin-bottom: 10px; }
    
    .btn-app { 
      border-radius: 12px; padding: 16px; font-weight: 700; 
      border: none; width: 100%; transition: 0.2s; 
    }
    .btn-next { background: var(--brand); color: white; }
    .btn-back { background: #ebecf0; color: #42526e; margin-top: 10px; }

    .form-control { border: 2px solid #ebecf0; padding: 12px; border-radius: 10px; margin-bottom: 15px; }
    .hidden { display: none !important; }
    
    #loader { 
      position: absolute; top:0; left:0; width:100%; height:100%; 
      background: rgba(255,255,255,0.8); z-index: 100; 
      display: none; align-items: center; justify-content: center; 
    }
  </style>
</head>
<body>

  <div class="app-container">
    <div id="loader"><div class="spinner-border text-primary"></div></div>

    <section class="screen" id="scrAuth">
      <div class="scroll-body d-flex flex-column justify-content-center text-center">
        <img src="assets/logo.png" class="logo mx-auto" onerror="this.src='https://via.placeholder.com/200x60?text=HSBS+PRO'">
        <h4 class="fw-bold mb-4">Executive Portal</h4>
        <div class="card-ui">
          <input type="text" id="logU" class="form-control" placeholder="Executive ID">
          <input type="password" id="logP" class="form-control" placeholder="Password">
          <button onclick="App.login()" class="btn-app btn-next">Login</button>
        </div>
      </div>
    </section>

    <section class="screen" id="scr1">
      <div class="p-3 bg-white border-bottom fw-bold text-center">Step 1: Customer</div>
      <div class="scroll-body">
        <div class="card-ui">
          <label class="small fw-bold">NAME</label>
          <input type="text" id="fName" class="form-control">
          <label class="small fw-bold">MOBILE</label>
          <input type="tel" id="fMob" class="form-control" maxlength="10">
          <label class="small fw-bold">AREA</label>
          <select id="fArea" class="form-control"></select>
        </div>
        <button onclick="App.move(2)" class="btn-app btn-next mt-3">Next Step</button>
      </div>
    </section>

    </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzZy-i7CmNQMOidshyHIn5v0ikxTDt2lyoGN1XkCqx6hIgSeSirvSSMdOTfOg_Acss/exec";

    const App = {
      user: localStorage.getItem('hsbs_user'),
      
      init() {
        if(this.user) { this.fetchData(); this.move(1); }
        else { this.move(0); }
      },

      move(n) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        const id = n === 0 ? 'scrAuth' : 'scr'+n;
        const target = document.getElementById(id);
        if(target) target.classList.add('active');
      },

      login() {
        const u = document.getElementById('logU').value;
        const p = document.getElementById('logP').value;
        document.getElementById('loader').style.display = 'flex';

        fetch(GAS_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'validateLogin', u: u, p: p })
        })
        .then(r => r.json())
        .then(res => {
          document.getElementById('loader').style.display = 'none';
          if(res.success) {
            localStorage.setItem('hsbs_user', res.user);
            this.user = res.user;
            location.reload(); 
          } else {
            alert("Login Failed");
          }
        }).catch(e => {
          document.getElementById('loader').style.display = 'none';
          alert("Check Connection/GAS URL");
        });
      },

      fetchData() {
        fetch(`${GAS_URL}?action=getFormData`)
        .then(r => r.json())
        .then(res => {
          const area = document.getElementById('fArea');
          res.areas.forEach(a => area.add(new Option(a, a)));
        });
      }
    };

    App.init();
  </script>
</body>
</html>
