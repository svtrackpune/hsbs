<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root { --brand: #0052cc; --bg: #f4f5f7; }
    body { background: var(--bg); font-family: sans-serif; height: 100vh; overflow: hidden; }
    .screen { position: absolute; width: 100%; height: 100%; display: none; background: var(--bg); flex-direction: column; }
    .screen.active { display: flex; }
    .app-header { background: white; padding: 15px; border-bottom: 1px solid #ddd; text-align: center; }
    .logo { height: 40px; margin-bottom: 5px; }
    .scroll-body { flex: 1; padding: 20px; overflow-y: auto; }
    .footer { padding: 15px; background: white; border-top: 1px solid #ddd; display: flex; gap: 10px; }
    .btn-app { border-radius: 10px; padding: 12px; flex: 1; font-weight: bold; border: none; }
    .btn-primary { background: var(--brand); color: white; }
    .choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
    .choice { border: 2px solid #ddd; padding: 12px; border-radius: 10px; text-align: center; background: white; cursor: pointer; }
    .choice.selected { border-color: var(--brand); background: #eef4ff; color: var(--brand); }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="scrAuth" class="screen">
    <div class="scroll-body d-flex flex-column justify-content-center">
      <div class="text-center mb-4">
        <img src="assets/logo.png" class="logo" alt="HSBS">
        <h4 class="fw-bold">Executive Portal</h4>
      </div>
      <input type="text" id="logU" class="form-control mb-2" placeholder="Executive ID">
      <input type="password" id="logP" class="form-control mb-3" placeholder="Password">
      <button onclick="App.login()" class="btn-app btn-primary">Login</button>
    </div>
  </div>

  <div id="scr1" class="screen">
    <div class="app-header fw-bold">Customer Details</div>
    <div class="scroll-body">
      <label class="small fw-bold text-muted">NAME</label>
      <input type="text" id="fName" class="form-control mb-3">
      <label class="small fw-bold text-muted">MOBILE</label>
      <input type="tel" id="fMob" class="form-control mb-3" maxlength="10">
      <label class="small fw-bold text-muted">AREA</label>
      <select id="fArea" class="form-select"></select>
    </div>
    <div class="footer"><button onclick="App.move(2)" class="btn-app btn-primary">Next</button></div>
  </div>

  <div id="scr2" class="screen">
    <div class="app-header fw-bold">Analysis</div>
    <div class="scroll-body">
      <div class="choice-grid">
        <div class="choice selected" id="optFresh" onclick="App.setType('Fresh')">Fresh</div>
        <div class="choice" id="optExist" onclick="App.setType('Existing')">Existing</div>
      </div>
      <div id="ispBox" class="hidden">
        <select id="fIsp" class="form-select mb-2" onchange="App.loadComp()"></select>
        <select id="fCompPlan" class="form-select mb-2" onchange="App.syncP()"></select>
        <input type="number" id="fPrice" class="form-control mb-3" placeholder="Monthly Bill">
      </div>
      <hr>
      <label class="small fw-bold text-muted">IPTV/OTT?</label>
      <div class="choice-grid">
        <div class="choice selected" id="optINo" onclick="App.setIPTV('No')">No</div>
        <div class="choice" id="optIYes" onclick="App.setIPTV('Yes')">Yes</div>
      </div>
    </div>
    <div class="footer">
      <button onclick="App.move(1)" class="btn-app bg-light">Back</button>
      <button onclick="App.move(3)" class="btn-app btn-primary">Calculate</button>
    </div>
  </div>

  <div id="scr3" class="screen">
    <div class="app-header fw-bold">HSBS Recommendation</div>
    <div class="scroll-body">
      <select id="fHsbs" class="form-select mb-4" onchange="App.calc()"></select>
      <div class="p-3 bg-white border rounded text-center mb-3">
        <small class="text-muted">ANNUAL SAVINGS</small>
        <h2 id="fSave" class="fw-bold text-success">₹ 0.00</h2>
      </div>
      <textarea id="fRem" class="form-control" placeholder="Remarks..."></textarea>
    </div>
    <div class="footer">
      <button onclick="App.move(2)" class="btn-app bg-light">Back</button>
      <button onclick="App.submit()" id="subBtn" class="btn-app btn-success text-white">Upload Lead</button>
    </div>
  </div>

  <script>
    const GAS_URL = "YOUR_DEPLOYED_URL_HERE"; // PASTE YOUR NEW /exec URL HERE

    const App = {
      db: {}, user: localStorage.getItem('hsbs_user'), type: 'Fresh', iptv: 'No',

      init() {
        if(this.user) { this.move(1); this.fetchData(); } 
        else { this.move(0); }
      },

      fetchData() {
        fetch(`${GAS_URL}?action=getFormData`).then(r => r.json()).then(res => {
          this.db = res;
          res.areas.forEach(a => document.getElementById('fArea').add(new Option(a, a)));
          res.hsbsPlans.forEach(p => document.getElementById('fHsbs').add(new Option(p.displayText, p.name)));
          Object.keys(res.competitorPlans).forEach(i => document.getElementById('fIsp').add(new Option(i, i)));
        });
      },

      login() {
        const u = document.getElementById('logU').value;
        const p = document.getElementById('logP').value;
        fetch(GAS_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'validateLogin', u: u, p: p })
        }).then(r => r.json()).then(res => {
          if(res.success) {
            localStorage.setItem('hsbs_user', u);
            this.user = u;
            location.reload();
          } else { alert("Invalid Credentials"); }
        });
      },

      move(n) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        const id = n === 0 ? 'scrAuth' : 'scr'+n;
        document.getElementById(id).classList.add('active');
      },

      setType(v) {
        this.type = v;
        document.getElementById('optFresh').classList.toggle('selected', v === 'Fresh');
        document.getElementById('optExist').classList.toggle('selected', v === 'Existing');
        document.getElementById('ispBox').classList.toggle('hidden', v === 'Fresh');
      },

      setIPTV(v) {
        this.iptv = v;
        document.getElementById('optINo').classList.toggle('selected', v === 'No');
        document.getElementById('optIYes').classList.toggle('selected', v === 'Yes');
      },

      loadComp() {
        const isp = document.getElementById('fIsp').value;
        const drop = document.getElementById('fCompPlan');
        drop.innerHTML = '<option value="0">Select Plan</option>';
        this.db.competitorPlans[isp].forEach(p => drop.add(new Option(p.text, p.price)));
      },

      syncP() { document.getElementById('fPrice').value = document.getElementById('fCompPlan').value; this.calc(); },

      calc() {
        const curr = parseFloat(document.getElementById('fPrice').value || 0);
        const plan = this.db.hsbsPlans.find(p => p.name === document.getElementById('fHsbs').value);
        if(plan) {
          const s = (curr - (plan.basePrice / plan.duration)) * 12;
          document.getElementById('fSave').innerText = "₹ " + (s > 0 ? s.toFixed(2) : "0.00");
        }
      },

      submit() {
        const btn = document.getElementById('subBtn');
        btn.disabled = true; btn.innerText = "Uploading...";
        const data = {
          exec: this.user, name: document.getElementById('fName').value,
          mob: document.getElementById('fMob').value, area: document.getElementById('fArea').value,
          type: this.type, isp: document.getElementById('fIsp').value,
          iptv: this.iptv, plan: document.getElementById('fHsbs').value,
          save: document.getElementById('fSave').innerText, rem: document.getElementById('fRem').value
        };
        fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'saveLead', data: data }) })
        .then(() => {
          alert("Lead Uploaded Successfully!");
          // Instead of reload, just clear the form and go to Step 1
          document.getElementById('fName').value = "";
          document.getElementById('fMob').value = "";
          this.move(1);
          btn.disabled = false; btn.innerText = "Upload Lead";
        });
      }
    };

    App.init();
  </script>
</body>
</html>
