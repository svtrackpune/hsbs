<html lang="en">

</body>
  <style>
    :root { --brand: #0052cc; --bg: #f4f5f7; --accent: #00875a; }
    body { background: #172b4d; height: 100vh; margin: 0; font-family: sans-serif; }
    .app-container { width: 100%; max-width: 450px; height: 100%; margin: auto; background: var(--bg); position: relative; overflow: hidden; display: flex; flex-direction: column; }
    .app-header { background: white; padding: 10px 15px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
    .screen { position: absolute; width: 100%; height: calc(100% - 50px); top: 50px; display: none; flex-direction: column; padding: 15px; overflow-y: auto; }
    .screen.active { display: flex; }
    .card-ui { background: white; border-radius: 10px; padding: 15px; border: 1px solid #dfe1e6; margin-bottom: 12px; }
    .btn-app { border-radius: 8px; padding: 12px; font-weight: bold; border: none; width: 100%; margin-top: 10px; }
    .btn-next { background: var(--brand); color: white; }
    .choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .choice { border: 2px solid #ddd; padding: 10px; border-radius: 8px; text-align: center; background: white; cursor: pointer; font-size: 0.85rem; }
    .choice.selected { border-color: var(--brand); background: #deebff; color: var(--brand); font-weight: bold; }
    .form-label { font-size: 0.7rem; font-weight: bold; color: #6b778c; text-transform: uppercase; margin-top: 8px; display: block; }
    .summary-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #eee; font-size: 0.9rem; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="app-container">
    <div class="app-header" id="nav" style="display:none;">
      <span class="fw-bold">HSBS PRO</span>
      <button class="btn btn-sm btn-outline-danger" onclick="App.logout()">Logout</button>
    </div>

    <section class="screen active" id="scr0" style="top:0; height:100%;">
      <div class="d-flex flex-column justify-content-center h-100 px-3 text-center">
        <h3 class="text-white mb-4">HSBS LOGIN</h3>
        <div class="card-ui">
          <input type="text" id="logU" class="form-control mb-2" placeholder="Executive ID">
          <input type="password" id="logP" class="form-control mb-3" placeholder="Password">
          <button onclick="App.login()" class="btn-app btn-next">Login</button>
        </div>
      </div>
    </section>

    <section class="screen" id="scr1">
      <div class="card-ui">
        <label class="form-label">Full Name</label>
        <input type="text" id="fName" class="form-control mb-2">
        <label class="form-label">Mobile</label>
        <input type="tel" id="fMob" class="form-control mb-2" maxlength="10">
        <label class="form-label">Area</label>
        <select id="fArea" class="form-select mb-3"></select>
        <div class="p-2 bg-light text-center rounded border">
          <div id="gpsStatus" class="small mb-1 text-muted">📡 GPS Pending...</div>
          <button class="btn btn-sm btn-secondary w-100" onclick="App.getGPS()">Fix GPS</button>
        </div>
      </div>
      <button onclick="App.move(2)" class="btn-app btn-next">Next: Setup</button>
    </section>

    <section class="screen" id="scr2">
      <label class="form-label">Broadband Status</label>
      <div class="choice-grid">
        <div class="choice selected" id="stFresh" onclick="App.setStatus('Fresh')">Fresh</div>
        <div class="choice" id="stExist" onclick="App.setStatus('Existing')">Existing</div>
      </div>
      
      <div id="ispBox" class="hidden card-ui">
        <label class="form-label">Provider</label>
        <select id="fIsp" class="form-select mb-2" onchange="App.loadComp()"></select>
        <select id="fCompPlan" class="form-select mb-2" onchange="App.calc()"></select>
        <input type="date" id="fExpiry" class="form-control mb-1">
      </div>

      <label class="form-label">IPTV/OTT Interest?</label>
      <div class="choice-grid">
        <div class="choice selected" id="iptvNo" onclick="App.setIPTV('No')">No</div>
        <div class="choice" id="iptvYes" onclick="App.setIPTV('Yes')">Yes</div>
      </div>

      <div id="tvBox" class="hidden card-ui">
        <label class="form-label">TV Type</label>
        <div class="choice-grid">
          <div class="choice selected" id="tvSmart" onclick="App.setTV('Android TV')">Android TV</div>
          <div class="choice" id="tvNormal" onclick="App.setTV('Not Android')">Not Android</div>
        </div>
      </div>
      <div class="d-flex gap-2"><button onclick="App.move(1)" class="btn-app bg-white border">Back</button><button onclick="App.move(3)" class="btn-app btn-next">Next</button></div>
    </section>

    <section class="screen" id="scr3">
      <div class="card-ui">
        <label class="form-label">Interested?</label>
        <div class="choice-grid">
          <div class="choice selected" id="intYes" onclick="App.setInterested('Yes')">Yes</div>
          <div class="choice" id="intNo" onclick="App.setInterested('No')">No</div>
        </div>
        <label class="form-label">Select HSBS Plan</label>
        <select id="fHsbs" class="form-select mb-3" onchange="App.calc()"></select>
        <div class="p-2 bg-success bg-opacity-10 text-success text-center rounded">
          <small>Est. Annual Saving</small>
          <h4 class="mb-0 fw-bold" id="vSave">₹ 0.00</h4>
        </div>
        <input type="text" id="fRem" class="form-control mt-3" placeholder="Remarks...">
      </div>
      <button onclick="App.showSummary()" class="btn-app btn-next">Verify Summary</button>
      <button onclick="App.move(2)" class="btn-app bg-white border mt-1">Back</button>
    </section>

    <section class="screen" id="scr4">
      <div class="card-ui">
        <h5 class="fw-bold text-center border-bottom pb-2">LEAD SUMMARY</h5>
        <div id="summaryContent"></div>
      </div>
      <button onclick="App.submit()" id="subBtn" class="btn-app btn-next" style="background:var(--accent)">Confirm & Upload</button>
      <button onclick="App.move(3)" class="btn-app bg-white border mt-1">Edit Lead</button>
    </section>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwxMKuxDPpIsXHm3pWGTVTYW-QIDbUtu_tRe2ok7kD1VoWj9coPSoIJSkii50IguR4/exec";

    const App = {
      db:{}, user:localStorage.getItem('h_user'), lat:0, lng:0, status:'Fresh', iptv:'No', tv:'Android TV', interested:'Yes',

      init() { if(this.user) { document.getElementById('nav').style.display='flex'; this.fetchData(); this.getGPS(); this.move(1); } else this.move(0); },
      logout() { localStorage.removeItem('h_user'); location.reload(); },

      getGPS() {
        navigator.geolocation.getCurrentPosition(p => {
          this.lat = p.coords.latitude; this.lng = p.coords.longitude;
          document.getElementById('gpsStatus').innerText = "✅ GPS Fixed";
        }, () => { document.getElementById('gpsStatus').innerText = "❌ GPS Error"; });
      },

      fetchData() {
        fetch(`${GAS_URL}?action=getFormData`).then(r => r.json()).then(res => {
          this.db = res;
          res.areas.forEach(a => document.getElementById('fArea').add(new Option(a, a)));
          res.hsbsPlans.forEach((p, i) => document.getElementById('fHsbs').add(new Option(p.fullName, i)));
          Object.keys(res.competitorPricing).forEach(isp => document.getElementById('fIsp').add(new Option(isp, isp)));
        });
      },

      loadComp() {
        const isp = document.getElementById('fIsp').value;
        const drop = document.getElementById('fCompPlan'); drop.innerHTML = "";
        this.db.competitorPricing[isp].forEach((plan, i) => drop.add(new Option(plan.p, i)));
        this.calc();
      },

      calc() {
        const isp = document.getElementById('fIsp').value;
        const compIdx = document.getElementById('fCompPlan').value;
        const hsbsIdx = document.getElementById('fHsbs').value;
        const cPlan = this.db.competitorPricing[isp][compIdx];
        const hPlan = this.db.hsbsPlans[hsbsIdx];
        if(cPlan && hPlan && this.status === 'Existing') {
          const savings = (cPlan.m - hPlan.monthlyCost) * 12;
          document.getElementById('vSave').innerText = "₹ " + (savings > 0 ? savings.toFixed(2) : "0.00");
        } else { document.getElementById('vSave').innerText = "₹ 0.00"; }
      },

      move(n) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById('scr'+n).classList.add('active'); },

      login() {
        fetch(GAS_URL, { method:'POST', body: JSON.stringify({action:'validateLogin', u:document.getElementById('logU').value, p:document.getElementById('logP').value}) })
        .then(r=>r.json()).then(res => { if(res.success) { localStorage.setItem('h_user', res.user); location.reload(); } else alert("Login Failed"); });
      },

      setStatus(v) { this.status = v; document.getElementById('stFresh').classList.toggle('selected', v=='Fresh'); document.getElementById('stExist').classList.toggle('selected', v=='Existing'); document.getElementById('ispBox').classList.toggle('hidden', v=='Fresh'); this.calc(); },
      setIPTV(v) { this.iptv = v; document.getElementById('iptvNo').classList.toggle('selected', v=='No'); document.getElementById('iptvYes').classList.toggle('selected', v=='Yes'); document.getElementById('tvBox').classList.toggle('hidden', v=='No'); },
      setTV(v) { this.tv = v; document.getElementById('tvSmart').classList.toggle('selected', v=='Android TV'); document.getElementById('tvNormal').classList.toggle('selected', v=='Not Android'); },
      setInterested(v) { this.interested = v; document.getElementById('intYes').classList.toggle('selected', v=='Yes'); document.getElementById('intNo').classList.toggle('selected', v=='No'); },

      showSummary() {
        const hPlan = this.db.hsbsPlans[document.getElementById('fHsbs').value];
        const rows = [
          ["Name", document.getElementById('fName').value],
          ["Mobile", document.getElementById('fMob').value],
          ["Area", document.getElementById('fArea').value],
          ["Status", this.status],
          ["Plan", hPlan.fullName],
          ["Interested", this.interested],
          ["IPTV", this.iptv + (this.iptv=='Yes' ? ` (${this.tv})` : "")]
        ];
        document.getElementById('summaryContent').innerHTML = rows.map(r => `<div class="summary-row"><b>${r[0]}</b><span>${r[1]}</span></div>`).join('');
        this.move(4);
      },

      submit() {
        const btn = document.getElementById('subBtn'); btn.disabled = true; btn.innerText = "Syncing...";
        const hPlan = this.db.hsbsPlans[document.getElementById('fHsbs').value];
        const data = {
          exec:this.user, name:document.getElementById('fName').value, mob:document.getElementById('fMob').value, area:document.getElementById('fArea').value,
          lat:this.lat, lng:this.lng, status:this.status, isp:document.getElementById('fIsp').value, 
          currPlan: document.getElementById('fCompPlan').options[document.getElementById('fCompPlan').selectedIndex]?.text || "N/A",
          expiry:document.getElementById('fExpiry').value, interested:this.interested, iptv:this.iptv, tv_type:this.tv, 
          speed:hPlan.speed, save: document.getElementById('vSave').innerText, rem:document.getElementById('fRem').value
        };
        fetch(GAS_URL, { method:'POST', body: JSON.stringify({action:'saveLead', data:data}) })
        .then(() => { alert("Success!"); location.reload(); });
      }
    };
    App.init();
  </script>
</body>
</html>
